name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing published release tag whose assets should be rebuilt"
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        name: Validate release tag
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "Release tag must match v<version> using only letters, numbers, ., _, and -." >&2
            exit 1
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Require an existing release for a manual rebuild
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: refs/tags/${{ steps.tag.outputs.tag }}

      - name: Require the latest embedded provider catalog
        if: github.event_name == 'push'
        run: python3 scripts/sync_provider_catalog.py --check

      - name: Validate the tag's committed provider catalog
        if: github.event_name == 'workflow_dispatch'
        run: |
          # workflow_dispatch only rebuilds an existing release. This check is
          # deliberately offline so the tag remains reproducible even if the
          # catalog repository changes or an old release asset disappears.
          if [[ -f scripts/sync_provider_catalog.py ]]; then
            python3 scripts/sync_provider_catalog.py --check-pinned
          else
            echo "This legacy tag predates provider catalog sync tooling; preserving its committed snapshot."
          fi

  build:
    name: ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            # Last Intel macOS image on Actions (supported until Aug 2027);
            # macos-13 was retired 2025-12-04.
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p euler-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          version="$RELEASE_TAG"
          name="euler-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/euler" "$name/"
          cp README.md LICENSE "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.target }}
          path: |
            euler-*.tar.gz
            euler-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --verify-tag --title "Euler $RELEASE_TAG" --generate-notes
          fi
          gh release upload "$RELEASE_TAG" release-assets/*.tar.gz release-assets/*.tar.gz.sha256 --clobber
